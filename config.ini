; =============================================================================
; 검토 및 입력 프로그램 — 경로·URL 설정 (config.ini)
; =============================================================================
; ■ 이 파일만 수정하면 NAS/검토 폴더 경로를 한곳에서 관리할 수 있습니다.
; ■ IP만 바꾸면 %(TEAM_ROOT)s 등으로 연결된 하위 경로가 함께 바뀝니다.
; ■ %(변수명)s 는 위쪽에 정의된 값으로 자동 치환됩니다.
;
; ■ 섹션 구성
;   [DEFAULT]  NAS IP, 측정팀/개인업무/성적서/검토 루트 (다른 경로의 기준)
;   [PATHS]    프로그램이 실제로 쓰는 폴더·파일 경로
;   [URLS]     측정인.kr 웹 주소
;
; ■ 프로그램 ↔ 설정 키 (빠른 찾기)
;   성적서 검토      → REPORT_SRC, USER_ROOT
;   발송대장 검토    → RECEIPT_REVIEW, DAEJANG_ROOT, MOISTURE_*, THC_*
;   측정인 검토      → MEASIN_REVIEW, MEASIN_PDF_DIR
;   측정인 입력      → REPORT_DONE, PDF_AIR/WATER, WATER_RECORD_PDF_DIR, PDF_TMP_DIR
;                      WATER_REPORT_*, WATER_TAB4_* (매크로·그리드·PDF input id)
;   종합 검토(dash)  → TOTAL_REVIEW, RECEIPT_REVIEW, MEASIN_REVIEW
;   차량운행일지     → DAEJANG_ROOT, DRIVE_LOG_REVIEW, REPORT_BASE
;   오류 로그        → LOG_DIR
; =============================================================================

[DEFAULT]
; ---------------------------------------------------------------------------
; NAS 기준 (여기만 바꿔도 연결 경로 대부분이 따라감)
; ---------------------------------------------------------------------------

; NAS 서버 IP
; 사용: 모든 \\IP\... UNC 경로의 기준
IP = 192.168.10.163

; 측정팀 공유 루트
; 예) \\192.168.10.163\측정팀
; 사용: 발송대장, 성적서, 검토 폴더의 상위
TEAM_ROOT = \\%(IP)s\측정팀

; 개인업무 공유 (직원별 폴더)
; 예) \\192.168.10.163\개인업무\홍길동
; 사용: report_check.py 결과 저장, report_check_gui 직원 목록
USER_ROOT = \\%(IP)s\개인업무

; 대기 성적서 루트
; 예) \\192.168.10.163\측정팀\2.성적서
; 사용: 성적서 단계 폴더·PDF·수분/THC·탭4 매크로의 기준
REPORT_BASE = %(TEAM_ROOT)s\2.성적서

; 검토 프로그램 모음 폴더 (이 프로그램들이 설치된 위치의 상위)
; 예) \\192.168.10.163\측정팀\10.검토
; 사용: 발송대장/측정인/차량/종합 검토 결과 저장
REVIEW_ROOT = %(TEAM_ROOT)s\10.검토

[PATHS]
; ---------------------------------------------------------------------------
; 성적서 NAS — 단계별 하위 폴더 (시료번호로 엑셀 찾을 때 전부 검색)
; ---------------------------------------------------------------------------
; 사용: receipt.py, measin_utils.py, eco_check.py, eco_input.py
; 값: 쉼표(,)로 구분, 순서 유지
REPORT_WORKFLOW_DIRS = 0 0.입력중, 0 1.완료, 0 2.검토중, 0 3.검토완료, 0 4.출력완료&에코랩입력중, 0 5.최종완료

; 성적서 검토 GUI — 파일 선택·검색 기본 폴더
; 예) ...\2.성적서\0 2.검토중
; 사용: report_check_gui.py, report_check.py
REPORT_SRC = %(REPORT_BASE)s\0 2.검토중

; 측정인 입력 완료 후 이동·확인 대상 폴더
; 예) ...\2.성적서\0 5.최종완료
; 사용: eco_input.py
REPORT_DONE = %(REPORT_BASE)s\0 5.최종완료

; 수질 성적서 NAS (연도\업체명\파일 구조)
; 예) ...\2.성적서\14.수질성적서
; 사용: eco_input.py (수질 모드)
WATER_REPORT_BASE = %(REPORT_BASE)s\14.수질성적서

; ---------------------------------------------------------------------------
; 시료접수발송대장
; ---------------------------------------------------------------------------

; 발송대장 엑셀 (연도\시료접수발송대장(대기)-N월.xlsm)
; 예) ...\측정팀\0.시료접수발송대장\2025년\...
; 사용: receipt.py, report_check.py, Vehicle_operation_log.py
DAEJANG_ROOT = %(TEAM_ROOT)s\0.시료접수발송대장

; ---------------------------------------------------------------------------
; 검토 결과 저장 (10.검토 아래)
; ---------------------------------------------------------------------------

; 발송대장 검토 결과 xlsx 저장
; 예) ...\10.검토\2.발송대장 검토
; 사용: receipt.py, dash.py (대장검토 파일 찾기 기본값)
RECEIPT_REVIEW = %(REVIEW_ROOT)s\2.발송대장 검토

; 측정인 검토 결과 xlsx 저장
; 예) ...\10.검토\3.측정인 검토
; 사용: eco_check.py
MEASIN_REVIEW = %(REVIEW_ROOT)s\3.측정인 검토

; 측정인 검토 시 다운로드·저장하는 PDF
; 예) ...\10.검토\3.측정인 검토\PDF
; 사용: eco_check.py
MEASIN_PDF_DIR = %(MEASIN_REVIEW)s\PDF

; 차량운행일지 검토 결과 저장
; 예) ...\10.검토\4.차량운행일지 검토
; 사용: Vehicle_operation_log.py
DRIVE_LOG_REVIEW = %(REVIEW_ROOT)s\4.차량운행일지 검토

; 종합 검토(dash) 결과 자동 저장
; 예) ...\10.검토\5.종합 검토
; 사용: dash.py
TOTAL_REVIEW = %(REVIEW_ROOT)s\5.종합 검토

; 프로그램 오류 로그
; 예) ...\10.검토\_logs\error_log.txt
; 사용: log_utils.py
LOG_DIR = %(REVIEW_ROOT)s\_logs

; ---------------------------------------------------------------------------
; PDF 저장 (측정인 업로드·입력용)
; ---------------------------------------------------------------------------

; 대기 PDF 저장 (연도\시료번호 앞7자리 등 하위 구조)
; 예) ...\2.성적서\0.PDF\2.대기pdf
; 사용: eco_input.py
PDF_AIR = %(REPORT_BASE)s\0.PDF\2.대기pdf

; 수질 PDF 저장 (연도\대행기록부 D3 공백제거\엑셀파일명.pdf)
; 예) ...\2.성적서\0.PDF\1.수질pdf
; 사용: eco_input.py
PDF_WATER = %(REPORT_BASE)s\0.PDF\1.수질pdf

; 수질 대행기록부 PDF만 복사 (성적서 엑셀 파일명.pdf, PDF 폴더 없으면 생성)
; 예) \\192.168.10.163\scan\PDF
; 사용: eco_input.py (수질 탭4 PDF 생성 시)
WATER_RECORD_PDF_DIR = \\%(IP)s\scan\기록부 PDF

; ---------------------------------------------------------------------------
; 백데이터 (수분·THC)
; ---------------------------------------------------------------------------

; 수분량 CSV 저장 루트 (연도\N월\시료번호.csv)
; 예) ...\2.성적서\0.수분량
; 사용: backdata_utils.py, receipt.py
MOISTURE_ROOT = %(REPORT_BASE)s\0.수분량

; THC CSV/FID 저장 루트
; 예) ...\2.성적서\0.THC
; 사용: backdata_utils.py, receipt.py
THC_ROOT = %(REPORT_BASE)s\0.THC

; 탭4(측정분석) 매크로 엑셀 — 측정인 입력 시 참조
; 예) ...\2.성적서\측정인 측정분석 입력 26.01.xlsm
; 사용: tab4_utils.py
TAB4_MACRO_FILE = %(REPORT_BASE)s\측정인 측정분석 입력 26.01.xlsm

; 수질 — 성적서 검색·파일추가 기본 폴더
; 사용: eco_input_gui.py, eco_input.py
WATER_REPORT_INPUT = %(WATER_REPORT_BASE)s\0.입력중

; 수질 탭4 매크로 엑셀
; 사용: water_input_utils.py
WATER_TAB4_MACRO_FILE = %(REPORT_BASE)s\측정인 측정분석 입력 26.05(수질).xlsm

; 수질 탭4 RealGrid 루트 (div#gridAnalySampAnzeDataAirItemList1 — gridMain1 은 바깥 래퍼)
; 사용: water_input_utils.py
WATER_TAB4_GRID_ROOT = #gridAnalySampAnzeDataAirItemList1

; 수질 탭4 PDF 업로드 input (대기 탭4는 #newFile1/#newFile2)
; 사용: eco_input.py
WATER_TAB4_FILE1 = #anzeFile1
WATER_TAB4_FILE2 = #anzeFile2

; 발송대장 검토 — 백데이터 비교용 샘플 파일 (파일명만 맞으면 됨)
; 사용: receipt.py
MOISTURE_SAMPLE = %(MOISTURE_ROOT)s\수분량샘플.csv
THC_CSV_SAMPLE = %(THC_ROOT)s\FID샘플.csv
THC_FID_SAMPLE = %(THC_ROOT)s\PF샘플.FID

; ---------------------------------------------------------------------------
; 로컬 PC (NAS 아님 — PC마다 다를 수 있음)
; ---------------------------------------------------------------------------

; 측정인 PDF 업로드 전 임시 생성 폴더 (권한·경로 인식 문제 줄이기)
; 사용: eco_input.py
; ※ 다른 드라이브/폴더를 쓰려면 이 PC에 맞게 경로만 수정
PDF_TMP_DIR = C:\measin_upload_tmp

[URLS]
; ---------------------------------------------------------------------------
; 측정인.kr (사이트 주소 변경 시 여기만 수정)
; ---------------------------------------------------------------------------

; 로그인 페이지
; 사용: measin_utils.py, eco_check.py, eco_input.py
LOGIN_URL = https://측정인.kr/init.go

; 현장측정분석 — 대기
; 사용: measin_utils.py, eco_check.py, eco_input.py (대기)
FIELD_URL_AIR = https://측정인.kr/ms/field_outair.do

; 현장측정분석 — 수질
; 사용: eco_input.py (수질)
FIELD_URL_WATER = https://측정인.kr/ms/field_outwater.do
